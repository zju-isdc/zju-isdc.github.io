          email: ['zunlei', 'feng', '@', 'zju', '.', 'edu', '.', 'cn']
        },
        {
          name: '宋杰',
          homepage: 'https://person.zju.edu.cn/songjie',
          field: '多模态大模型、空间智能、模型轻量化',
          email: ['sjie', '@', 'zju', '.', 'edu', '.', 'cn']
        },
        {
          name: '宛袁玉',
          homepage: 'https://person.zju.edu.cn/wanyy',
          field: '在线学习、分布式优化、数据制备、持续学习、模型合并',
          email: ['wanyy', '@', 'zju', '.', 'edu', '.', 'cn']
        },
        {
          name: '季珂宇',
          homepage: 'https://person.zju.edu.cn/NB25053',
          field: '密码学、数据安全、隐私保护计算、人工智能安全',

        },
        {
          name: '贾凌翔',
          homepage: 'https://vipazoo.cn/people/jialingxiang',

        },
        {
          name: '胡佳聪',
          homepage: 'https://jiaconghu.com/',

        },
        {
          name: '张皓飞',
          homepage: 'https://vipazoo.cn/people/zhanghaofei',
          field: '无人机自主视觉导航、多模态智能体、深度模型可解释',

        },
        {

          email: ['ty', 'zheng', '@', 'zju', '.', 'edu', '.', 'cn']
        }
      ];

      var list = document.getElementById('teacher-list');
      teachers.forEach(function (t) {
        var emailHtml = t.email
          ? (function () { var addr = t.email.join(''); return '<a class="teacher-email-link" href="mailto:' + addr + '">' + addr + '</a>'; })()
          : '';
        var li = document.createElement('li');
        li.className = 'teacher-item';
        li.innerHTML =
          '<div class="teacher-row1">' +
            '<a class="teacher-name" href="' + t.homepage + '" target="_blank" rel="noreferrer">' + t.name + '</a>' +
            emailHtml +
          '</div>' +
          '<div class="teacher-field">' + t.field + '</div>';
        list.appendChild(li);
      });

      var overlay = document.getElementById('modal-teachers');
      var btnOpen = document.getElementById('btn-teachers');
      var btnClose = document.getElementById('btn-teachers-close');

      function openModal() {
        overlay.style.display = 'flex';
        btnClose.focus();
      }
      function closeModal() {
        overlay.style.display = 'none';
        btnOpen.focus();
      }

      // Focus trap
      overlay.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') { closeModal(); return; }
        if (e.key !== 'Tab') return;
        var focusable = Array.prototype.slice.call(
          overlay.querySelectorAll('a[href], button:not([disabled])')
        );
        var first = focusable[0];
        var last = focusable[focusable.length - 1];
        if (e.shiftKey) {
          if (document.activeElement === first) { e.preventDefault(); last.focus(); }
        } else {
          if (document.activeElement === last) { e.preventDefault(); first.focus(); }
        }
      });

      btnOpen.addEventListener('click', openModal);
      btnClose.addEventListener('click', closeModal);
      overlay.addEventListener('click', function (e) { if (e.target === overlay) closeModal(); });
    })();
  </script>
